<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login PPS - Persatuan Pelayang Sumbar</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:0; }
    header { background:#004080; color:#fff; padding:20px; text-align:center; }
    nav { background:#333; padding:10px; }
    nav a { color:#fff; margin:0 10px; text-decoration:none; }
    nav a:hover { text-decoration:underline; }
    section { display:flex; justify-content:center; align-items:center; height:70vh; }
    .login-box { background:#fff; padding:30px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.2); width:300px; }
    .login-box h2 { text-align:center; margin-bottom:20px; }
    .login-box input { width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px; }
    .login-box button { width:100%; padding:10px; background:#004080; color:#fff; border:none; border-radius:5px; cursor:pointer; }
    .login-box button:hover { background:#0066cc; }
    footer { background:#004080; color:#fff; text-align:center; padding:10px; }
  </style>
</head>
<body>
  <header>
    <h1>Login Anggota & Pengurus PPS</h1>
  </header>

  <nav>
    <a href="index.html">Beranda</a>
    <a href="tentang.html">Tentang</a>
    <a href="kegiatan.html">Kegiatan</a>
    <a href="login.html">Login</a>
    <a href="#">Kontak</a>
  </nav>

  <section>
    <div class="login-box">
      <h2>Masuk</h2>
      <form>
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>
      <p style="text-align:center; margin-top:10px;">Belum punya akun? <a href="#">Daftar</a></p>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 PPS - Persatuan Pelayang Sumbar</p>
  </footer>
</body>
</html>
